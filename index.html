<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>モフポンポン ARフォトフレーム</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      .ui-overlay {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
      }
      button {
        padding: 15px 30px;
        font-size: 18px;
        background: #ffcc00;
        color: #553300;
        border: 4px solid #ffffff;
        border-radius: 50px;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <div class="ui-overlay">
      <button onclick="takeSnapshot()">📷 写真を撮る</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      <a-assets>
        <img id="mofu-image" src="mohu.png">
      </a-assets>

      <a-camera>
        <a-image src="#mofu-image" position="0 0 -3" width="2" height="2"></a-image>
      </a-camera>
    </a-scene>

    <script>
      function takeSnapshot() {
        alert("画像が表示されましたか？\n次は、この画面を写真として保存する仕組みを作ります！");
      }
    </script>
  </body>
</html>
