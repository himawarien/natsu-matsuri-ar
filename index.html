<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>夏祭りARフォトフレーム</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      /* 画面いっぱいに表示するための設定 */
      body { margin: 0; overflow: hidden; }
      .ui-overlay {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
      }
      button {
        padding: 10px 20px;
        font-size: 16px;
        background: #ff4500;
        color: white;
        border: none;
        border-radius: 20px;
      }
    </style>
  </head>

  <body>
    <div class="ui-overlay">
      <button onclick="takeSnapshot()">📷 写真を撮る</button>
    </div>

   <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
  <a-assets>
    <img id="mofu-image" src="mohu.png">
  </a-assets>

  <a-camera>
    <a-image src="#mofu-image" position="1 -1.2 -3" width="1.2" height="1.2"></a-image>
    
    <a-entity position="0 1.5 -3" geometry="primitive: plane; width: 2; height: 0.5" material="color: #ff9900; opacity: 0.8">
       <a-text value="ひまわり保育園 夏祭り" align="center"></a-text>
    </a-entity>
  </a-camera>
</a-scene>

    <script>
      function takeSnapshot() {
        alert("ここに撮影・保存の処理を書いていきます！");
      }
    </script>
  </body>
</html>
