<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>ひまわり保育園 夏祭りAR</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        /* UIレイアウト（ボタンとメッセージ） */
        .ui-overlay {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            background: #ffcc00; /* ひまわりイエロー */
            color: #553300;
            border: 4px solid #ffffff;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer;
        }
        #loading {
            display: none;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
            font-family: sans-serif;
        }
    </style>
</head>

<body>
    <div class="ui-overlay">
        <button id="snap-button" onclick="takeSnapshot()">📷 写真を撮る</button>
        <div id="loading">保存中...</div>
    </div>

   <a-scene 
  embedded 
  arjs="sourceType: webcam; debugUIEnabled: false;"
  screenshot="width: 1080; height: 1920;">
        <a-assets>
            <img id="mofu-frame" src="mohu.png">
        </a-assets>

        <a-camera>
           <a-image 
  src="#mofu-frame" 
  position="0 0 -9" 
  width="4" 
  height="7.11">
</a-image>
        </a-camera>
    </a-scene>

    <script>
        // --- Cloudinary 設定エリア ---
      const CLOUD_NAME = 'dr6x0dma6';
        const UPLOAD_PRESET = 'matsuri'; // ここがスクリーンショットの名前と一致していればOK

  function takeSnapshot() {
    const btn = document.getElementById('snap-button');
    const loading = document.getElementById('loading');
    
    btn.disabled = true;
    loading.style.display = 'block';

    const video = document.querySelector('video');
    const sceneCanvas = document.querySelector('canvas.a-canvas');
    
    // 1. 合成用のキャンバスを「スマホの画面サイズ（表示サイズ）」で作る
    const canvas = document.createElement('canvas');
    canvas.width = video.clientWidth;
    canvas.height = video.clientHeight;
    const ctx = canvas.getContext('2d');

    // 2. ビデオ映像を「画面で見えている通り」に切り取って描画
    // これで、上下に黒い帯が入ったり、潰れたりするのを防ぎます
    const vW = video.videoWidth;
    const vH = video.videoHeight;
    const vRatio = vW / vH;
    const cRatio = canvas.width / canvas.height;

    let sx, sy, sw, sh;
    if (vRatio > cRatio) {
        sw = vH * cRatio;
        sh = vH;
        sx = (vW - sw) / 2;
        sy = 0;
    } else {
        sw = vW;
        sh = vW / cRatio;
        sx = 0;
        sy = (vH - sh) / 2;
    }

    ctx.drawImage(video, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);

    // 3. イラストを「画面の表示サイズ」のまま上書き
    // これで、真ん中に寄ることなく、四隅までピッタリ重なります
    ctx.drawImage(sceneCanvas, 0, 0, canvas.width, canvas.height);

    const dataURL = canvas.toDataURL('image/jpeg', 0.9);

    const formData = new FormData();
    formData.append('file', dataURL);
    formData.append('upload_preset', UPLOAD_PRESET);

    fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
        method: 'POST', body: formData
    })
    .then(res => res.json())
    .then(data => {
        if (data.secure_url) {
            alert("ついに『画面そのまま』で完成しました！\n長押しして保存してね！");
            window.location.href = data.secure_url;
        }
    })
    .catch(err => alert("通信エラーです"))
    .finally(() => {
        btn.disabled = false;
        loading.style.display = 'none';
    });
}
    </script>
</body>
</html>
