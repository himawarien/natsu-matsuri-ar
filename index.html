<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ひまわり保育園 夏祭りAR</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      .ui-overlay {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        text-align: center;
      }
      button {
        padding: 15px 30px;
        font-size: 18px;
        background: #ffcc00; /* ひまわり色 */
        color: #553300;
        border: 4px solid #ffffff;
        border-radius: 50px;
        font-weight: bold;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      }
    </style>
  </head>

  <body>
    <div class="ui-overlay">
      <button onclick="takeSnapshot()">📷 写真を撮る</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      <a-assets>
        <img id="mofu-image" src="mohu.png">
      </a-assets>

      <a-camera>
        <a-image src="#mofu-image" position="1.1 -1.3 -3" width="1.3" height="1.3"></a-image>
        
        <a-entity position="0 1.6 -3" geometry="primitive: plane; width: 2.2; height: 0.5" material="color: #ff9900; opacity: 0.9">
           <a-text value="Himawari Hoikuen\nSummer Festival" align="center" color="#ffffff"></a-text>
        </a-entity>
      </a-camera>
    </a-scene>

    <script>
      function takeSnapshot() {
        alert("モフポンポンと写真が撮れるようになるまで、あと少し！\n次は保存機能（Cloudinary）を作っていきましょう。");
      }
    </script>
  </body>
</html>
