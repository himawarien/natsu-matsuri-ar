<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>ひまわり保育園 夏祭りAR</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        /* UIレイアウト（ボタンとメッセージ） */
        .ui-overlay {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            background: #ffcc00; /* ひまわりイエロー */
            color: #553300;
            border: 4px solid #ffffff;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer;
        }
        #loading {
            display: none;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
            font-family: sans-serif;
        }
    </style>
</head>

<body>
    <div class="ui-overlay">
        <button id="hide-btn" onclick="startPhotoSession()" style="padding: 15px 30px; font-size: 18px; background: #ffcc00; border-radius: 50px; font-weight: bold;">
            ✨ 撮影モード（ボタンを隠す）
        </button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-assets>
            <img id="mofu-frame" src="mohu.png">
        </a-assets>
        <a-camera>
            <a-image 
                src="#mofu-frame" 
                position="0 0 -7" 
                width="4" 
                height="7.11">
            </a-image>
        </a-camera>
    </a-scene>

    <script>
        function startPhotoSession() {
            const btn = document.getElementById('hide-btn');
            
            // 1. ボタンを完全に消す
            btn.style.display = 'none';

            // 2. 5秒後にボタンを復活させる（その間にスクショ！）
            setTimeout(() => {
                btn.style.display = 'block';
            }, 5000);
        }
    </script>
</body>
</html>
