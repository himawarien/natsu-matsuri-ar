<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>ひまわり保育園 夏祭りAR</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        /* UIレイアウト（ボタンとメッセージ） */
        .ui-overlay {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            background: #ffcc00; /* ひまわりイエロー */
            color: #553300;
            border: 4px solid #ffffff;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer;
        }
        #loading {
            display: none;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
            font-family: sans-serif;
        }
    </style>
</head>

<body>
    <div class="ui-overlay">
        <button id="snap-button" onclick="takeSnapshot()">📷 写真を撮る</button>
        <div id="loading">保存中...</div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-assets>
            <img id="mofu-frame" src="mohu.png">
        </a-assets>

        <a-camera>
           <a-image 
  src="#mofu-frame" 
  position="0 0 -9" 
  width="4" 
  height="7.11">
</a-image>
        </a-camera>
    </a-scene>

    <script>
        // --- Cloudinary 設定エリア ---
      const CLOUD_NAME = 'dr6x0dma6';
        const UPLOAD_PRESET = 'matsuri'; // ここがスクリーンショットの名前と一致していればOK

        function takeSnapshot() {
            const btn = document.getElementById('snap-button');
            const loading = document.getElementById('loading');
            
            btn.disabled = true;
            loading.style.display = 'block';

            // ARシーンから画像を取得
            const scene = document.querySelector('a-scene');
            const canvas = scene.components.screenshot.getCanvas('perspective');
            const dataURL = canvas.toDataURL('image/jpeg');

            // フォームデータの作成
            const formData = new FormData();
            formData.append('file', dataURL);
            formData.append('upload_preset', UPLOAD_PRESET);

            // アップロード実行
            fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.secure_url) {
                    // 成功：撮った写真のURLへジャンプ
                    window.location.href = data.secure_url;
                } else {
                    console.error('Cloudinary Error:', data);
                    alert('保存に失敗しました。Cloudinaryの設定を確認してください。');
                }
            })
            .catch(err => {
                console.error('Fetch Error:', err);
                alert('通信エラーが発生しました。');
            })
            .finally(() => {
                btn.disabled = false;
                loading.style.display = 'none';
            });
        }
    </script>
</body>
</html>
