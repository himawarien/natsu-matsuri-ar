<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ひまわり保育園 夏祭りAR</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      /* 写真を撮るボタンのデザイン */
      .ui-overlay {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
      }
      button {
        padding: 15px 30px;
        font-size: 18px;
        background: #ffcc00;
        color: #553300;
        border: 4px solid #ffffff;
        border-radius: 50px;
        font-weight: bold;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      }
    </style>
  </head>

  <body>
    <div class="ui-overlay">
      <button onclick="takeSnapshot()">📷 写真を撮る</button>
    </div>

    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false; sourceWidth:1280; sourceHeight:720; displayWidth:1280; displayHeight:720;">
      
      <a-assets>
        <img id="mofu-image" src="mohu.png">
      </a-assets>

      <a-camera>
        <a-image 
          src="#mofu-image" 
          position="0 0 -5" 
          width="4.5" 
          height="4.5">
        </a-image>
      </a-camera>
    </a-scene>

    <script>
      function takeSnapshot() {
        // ここに Cloudinary と連携した保存処理を書いていきます
        alert("画像は綺麗に収まりましたか？\n次は Cloudinary で保存機能を作りましょう！");
      }
    </script>
  </body>
</html>
